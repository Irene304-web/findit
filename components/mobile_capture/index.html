<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 4px 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .capture-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 56px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .capture-btn:active { opacity: 0.88; }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
    }
    #preview {
      display: none;
      width: 100%;
      margin-top: 12px;
      border-radius: 12px;
      object-fit: cover;
    }
    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body>
  <label class="capture-btn" for="camInput">📷 点击拍照</label>
  <input type="file" id="camInput" accept="image/*" capture="environment" />
  <div class="hint">点击上方按钮 → 允许摄像头权限 → 即可拍照</div>
  <img id="preview" alt="已拍摄预览" />

  <script>
    /* 内联 Streamlit 通信，不依赖外部 CDN */
    const Streamlit = {
      setComponentValue: function(value) {
        window.parent.postMessage(
          { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value },
          "*"
        );
      },
      setFrameHeight: function(height) {
        window.parent.postMessage(
          { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: height },
          "*"
        );
      },
      setComponentReady: function() {
        window.parent.postMessage(
          { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
          "*"
        );
      }
    };

    const input = document.getElementById("camInput");
    const preview = document.getElementById("preview");

    function sendHeight() {
      Streamlit.setFrameHeight(document.body.scrollHeight + 12);
    }

    input.addEventListener("change", function(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        preview.src = reader.result;
        preview.style.display = "block";
        Streamlit.setComponentValue(reader.result);
        sendHeight();
      };
      reader.readAsDataURL(file);
    });

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(110);
  </script>
</body>
</html>
